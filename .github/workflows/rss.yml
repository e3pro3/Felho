name: Generate RSS

on:
  schedule:
    - cron: "12 */3 * * *"

  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packages
        run: |
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          python scraper.py

      - name: Commit feed
        run: |
          git config user.name github-actions
          git config user.email actions@github.com

          git add articles.json feed.xml

          git commit -m "Update RSS" || exit 0

          git push
